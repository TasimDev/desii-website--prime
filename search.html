<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Търсене · БоПромас</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #10151B;
    --navy-mid: #1B242E;
    --gold: #C8A45D;
    --gold-light: #E5C77B;
    --cream: #F6F8FA;
    --silver: #8998A8;
    --silver-light: #D3DAE2;
    --white: #FFFFFF;
  }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--navy);
    color: var(--cream);
    line-height: 1.6;
  }
  a { color: inherit; }
  .nav {
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(12,15,19,0.94);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(200,164,93,0.12);
    padding: 16px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 22px;
  }
  .nav-brand img {
    display: block;
    width: 154px;
    height: 44px;
    object-fit: cover;
    object-position: center;
  }
  .nav a:not(.nav-brand) {
    color: var(--silver-light);
    text-decoration: none;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  main {
    max-width: 1180px;
    margin: 0 auto;
    padding: 72px 40px 90px;
  }
  .eyebrow {
    color: var(--gold);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(38px, 6vw, 72px);
    line-height: 1;
    color: var(--white);
    margin-bottom: 18px;
  }
  .lead {
    max-width: 680px;
    color: var(--silver-light);
    margin-bottom: 34px;
  }
  .search-panel {
    display: flex;
    gap: 10px;
    margin-bottom: 38px;
  }
  .search-panel input {
    flex: 1;
    min-height: 50px;
    border: 1px solid rgba(200,164,93,0.24);
    background: rgba(255,255,255,0.055);
    color: var(--white);
    padding: 0 16px;
    font: inherit;
    outline: none;
  }
  .search-panel button,
  .card-link {
    min-height: 50px;
    border: 1px solid var(--gold);
    background: var(--gold);
    color: var(--navy);
    padding: 0 22px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 2px;
  }
  .result-card {
    min-height: 440px;
    border: 1px solid rgba(255,255,255,0.06);
    background:
      radial-gradient(circle at 72% 22%, rgba(200,164,93,0.16), transparent 36%),
      linear-gradient(145deg, rgba(255,255,255,0.055), rgba(255,255,255,0.015)),
      var(--navy-mid);
    padding: 24px;
    display: flex;
    flex-direction: column;
  }
  .card-image {
    height: 164px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 18px;
    background: rgba(255,255,255,0.035);
    position: relative;
  }
  .card-image::before {
    content: '';
    position: absolute;
    width: 138px;
    aspect-ratio: 1;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,164,93,0.26), rgba(200,164,93,0.08) 56%, transparent 74%);
  }
  .card-image img {
    position: relative;
    z-index: 1;
    max-width: 132px;
    max-height: 150px;
    object-fit: contain;
    filter: drop-shadow(0 28px 26px rgba(0,0,0,0.52));
  }
  .card-category {
    color: var(--gold);
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    color: var(--white);
    font-size: 24px;
    line-height: 1.12;
    margin-bottom: 12px;
  }
  .card-desc {
    color: var(--silver-light);
    font-size: 13px;
    margin-bottom: 18px;
  }
  .card-meta {
    color: var(--silver);
    font-size: 12px;
    margin-bottom: 14px;
  }
  .card-price {
    color: var(--gold-light);
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    font-weight: 700;
    margin-top: auto;
    margin-bottom: 18px;
  }
  .empty {
    display: none;
    padding: 34px;
    border: 1px solid rgba(200,164,93,0.18);
    background: rgba(255,255,255,0.035);
    color: var(--silver-light);
  }
  .empty.active { display: block; }
  @media (max-width: 720px) {
    .nav { padding: 12px 20px; }
    main { padding: 46px 22px 70px; }
    .search-panel { flex-direction: column; }
  }
  .call-button {
    position: fixed; right: 24px; bottom: 24px; z-index: 90;
    display: inline-flex; align-items: center; gap: 10px;
    min-height: 54px; padding: 0 20px; border-radius: 999px;
    border: 1px solid rgba(229,199,123,0.7);
    background: var(--gold); color: var(--navy);
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
    text-decoration: none;
    transition: background .25s ease, transform .25s ease, box-shadow .25s ease;
  }
  .call-button:hover { background: var(--gold-light); transform: translateY(-3px); box-shadow: 0 14px 34px rgba(0,0,0,.45); }
  .call-button:focus-visible { outline: 3px solid var(--white); outline-offset: 3px; }
  .call-button svg { width: 21px; height: 21px; fill: currentColor; flex-shrink: 0; }
  @media (max-width: 768px) {
    .call-button { right: 16px; bottom: 16px; width: 56px; height: 56px; min-height: 56px; justify-content: center; padding: 0; }
    .call-button span { display: none; }
  }
</style>
</head>
<body>
<nav class="nav">
  <a class="nav-brand" href="bar_offer.html" aria-label="BoProMas">
    <img src="assets/brand/bopromas-logo-transparent.png" alt="BoProMas">
  </a>
  <a href="bar_offer.html#catalog">Обратно към каталога</a>
</nav>

<main>
  <div class="eyebrow">Търсене в каталога</div>
  <h1 id="pageTitle">Резултати</h1>
  <p class="lead" id="pageLead">Продуктите се зареждат от общия продуктов файл на сайта.</p>
  <form class="search-panel" id="searchForm">
    <input id="searchInput" type="search" placeholder="Търси продукт..." autocomplete="off">
    <button type="submit">Търси</button>
  </form>
  <div class="results-grid" id="resultsGrid"></div>
  <div class="empty" id="emptyState">Няма намерени продукти по това търсене.</div>
</main>

<script src="product-data.js"></script>
<script>
function slugifyProduct(value) {
  return String(value || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .toLowerCase()
    .replace(/№/g, 'no')
    .replace(/&/g, ' and ')
    .replace(/[^a-z0-9а-я]+/gi, '-')
    .replace(/^-+|-+$/g, '');
}

function categoryImage(item) {
  const escapeXml = value => String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
  const title = escapeXml(item.name.length > 22 ? `${item.name.slice(0, 22)}...` : item.name);
  const cat = escapeXml(item.categoryName);
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
      <circle cx="300" cy="360" r="230" fill="#1B242E" stroke="#C8A45D" stroke-opacity=".3"/>
      <path d="M258 154h84v116c42 28 64 72 64 126v230c0 45-36 81-81 81h-50c-45 0-81-36-81-81V396c0-54 22-98 64-126V154z" fill="#263240" stroke="#C8A45D" stroke-opacity=".45" stroke-width="3"/>
      <rect x="218" y="380" width="164" height="140" fill="#0C0F13" stroke="#C8A45D" stroke-opacity=".55"/>
      <text x="300" y="438" text-anchor="middle" fill="#ffffff" font-family="Georgia, serif" font-size="27" font-weight="700">${title}</text>
      <text x="300" y="488" text-anchor="middle" fill="#C8A45D" font-family="Arial, sans-serif" font-size="16">${cat}</text>
    </svg>
  `;
  return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
}

function allItems() {
  return (window.CATALOG_CATEGORIES || []).flatMap(category =>
    category.items.map(item => ({ ...item, categoryId: category.id, categoryName: category.name }))
  );
}

function searchText(item) {
  return [
    item.name,
    item.categoryName,
    item.packaging,
    item.volume,
    item.abv,
    ...(item.badges || [])
  ].join(' ').toLowerCase();
}

function productHref(item) {
  const slug = item.slug || slugifyProduct(item.name);
  const params = new URLSearchParams({
    p: slug,
    name: item.name,
    category: item.categoryName,
    cat: item.categoryId,
    volume: item.volume,
    abv: item.abv,
    price: item.eurVat,
    bgn: item.bgnVat,
    detail: item.packaging && item.packaging !== 'Стандартна' ? item.packaging : '',
    variant: '1'
  });
  return `product.html?${params.toString()}`;
}

function productImage(item) {
  const images = window.CATALOG_PRODUCT_IMAGES || {};
  const slug = item.slug || slugifyProduct(item.name);
  return images[slug] || categoryImage(item);
}

function productDescription(item) {
  const detail = item.packaging && item.packaging !== 'Стандартна' ? `${item.packaging}. ` : '';
  return `${detail}${item.categoryName} от ценовата листа на БоПромас, подходящ за професионална барова употреба.`;
}

function renderResults(query) {
  const grid = document.getElementById('resultsGrid');
  const empty = document.getElementById('emptyState');
  const title = document.getElementById('pageTitle');
  const lead = document.getElementById('pageLead');
  const value = String(query || '').trim().toLowerCase();
  const results = value ? allItems().filter(item => searchText(item).includes(value)) : [];

  title.textContent = value ? `Резултати за "${query}"` : 'Търсене в каталога';
  lead.textContent = value ? `${results.length} намерени продукта.` : 'Въведете име, категория или марка, за да видите продуктите като карти.';
  grid.textContent = '';
  empty.classList.toggle('active', value && !results.length);

  results.forEach(item => {
    const card = document.createElement('article');
    card.className = 'result-card';
    card.innerHTML = `
      <div class="card-image"><img alt=""></div>
      <div class="card-category"></div>
      <h2 class="card-title"></h2>
      <p class="card-desc"></p>
      <div class="card-meta"></div>
      <div class="card-price"></div>
      <a class="card-link">Виж детайли</a>
    `;
    card.querySelector('img').src = productImage(item);
    card.querySelector('img').alt = item.name;
    card.querySelector('.card-category').textContent = item.categoryName;
    card.querySelector('.card-title').textContent = item.name;
    card.querySelector('.card-desc').textContent = productDescription(item);
    card.querySelector('.card-meta').textContent = `${item.volume} · ${item.abv} · кашон ${item.case}`;
    card.querySelector('.card-price').textContent = `${item.eurVat} €`;
    card.querySelector('.card-link').href = productHref(item);
    grid.appendChild(card);
  });
}

const params = new URLSearchParams(window.location.search);
const input = document.getElementById('searchInput');
input.value = params.get('q') || '';
renderResults(input.value);

document.getElementById('searchForm').addEventListener('submit', event => {
  event.preventDefault();
  const query = input.value.trim();
  history.replaceState(null, '', query ? `search.html?q=${encodeURIComponent(query)}` : 'search.html');
  renderResults(query);
});
</script>
<a class="call-button" href="tel:+359897898245" aria-label="Обадете се на +359 897 898 245">
  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.62 10.79a15.46 15.46 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.02-.24c1.12.37 2.33.57 3.57.57a1 1 0 0 1 1 1V20a1 1 0 0 1-1 1C10.61 21 3 13.39 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.25.2 2.45.57 3.57a1 1 0 0 1-.25 1.02l-2.2 2.2Z"/></svg>
  <span>+359 897 898 245</span>
</a>
</body>
</html>
